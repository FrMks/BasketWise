services:
  catalog-service:
    build:
      context: .
      dockerfile: src/Dockerfile
      args:
        GITHUB_PACKAGES_USERNAME: ${GITHUB_PACKAGES_USERNAME}
        GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogServiceDb: Server=postgres;Port=5432;Database=catalog_service_db;User Id=postgres;Password=postgres;
      ConnectionStrings__Seq: http://seq:5341
      ConnectionStrings__Redis: redis:6379
      Swagger__ServerUrl: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalog_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_service_db"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINUSERNAME: "admin"
      SEQ_FIRSTRUN_ADMINPASSWORD: "YourStrong!Pass1"
    ports:
      - "8082:80"
      - "5431:5341"
    volumes:
      - seq-data:/data

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  seq-data:
